[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:serve]
command=php /var/www/html/artisan serve --host=0.0.0.0 --port=8000
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stdout_logfile=/var/log/php/serve.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/php/serve.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5

[program:reverb]
command=php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stdout_logfile=/var/log/php/reverb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/php/reverb.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5

[program:queue]
command=php /var/www/html/artisan queue:work
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/var/log/php/queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/php/queue.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
