[supervisord]
nodaemon=true
logfile=/var/www/html/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
pidfile=/tmp/supervisord.pid
user=appuser

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:serve]
command=php /var/www/html/artisan serve --host=0.0.0.0 --port=8000
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopasgroup=true
stdout_logfile=/var/www/html/logs/serve.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/www/html/logs/serve.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5

[program:reverb]
command=php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopasgroup=true
stdout_logfile=/var/www/html/logs/reverb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/www/html/logs/reverb.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5

[program:queue]
command=php /var/www/html/artisan queue:work
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopwaitsecs=30
stopasgroup=true
stdout_logfile=/var/www/html/logs/queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/www/html/logs/queue.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
