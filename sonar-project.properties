# SonarQube 서버에서 이 프로젝트를 식별할 고유 키 (원하는 영문/숫자로 작성)
sonar.projectKey=cl_embed

# 대시보드에 표시될 프로젝트 이름
sonar.projectName=cl_embed

# 소스 코드가 있는 디렉토리 (현재 폴더를 의미하는 . 입력)
sonar.sources=.

# 인코딩 설정
sonar.sourceEncoding=UTF-8

# (선택/권장) 분석에서 제외할 폴더 지정
# 외부 라이브러리나 벤더 폴더를 스캔하면 시간이 오래 걸리고 남의 코드에서 나온 버그까지 검사하므로 제외하는 것이 좋습니다.
sonar.exclusions=vendor/**, node_modules/**, .next/**