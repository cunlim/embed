name: Local CI/CD
# 브랜치 전략: develop + main
# - develop: 일상 개발 브랜치 (feature/* → PR → develop)
# - main:   안정 릴리스 브랜치 (develop → PR → main, CI/CD 자동 배포)
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # 1. Laravel 테스트 실행 — 회귀 방지
      - name: Run Laravel Tests
        run: docker exec cl_embed_laravel php artisan test --compact

      # 2. DB 마이그레이션 실행 — 스키마 변경 반영
      - name: Run Database Migrations
        run: docker exec cl_embed_laravel php artisan migrate --force

      # 3. 컨테이너 재시작 및 데몬 재실행
      - name: Restart Containers and Run Daemons
        run: |
          cd ./docker
          docker compose restart cl_embed_nextjs
          docker compose restart cl_embed_laravel
          sleep 3
          docker exec -d cl_embed_laravel bash -c "
            nohup php artisan serve --host=0.0.0.0 --port=8000 > logs/serve.log 2>&1 &
            nohup php artisan reverb:start --host=0.0.0.0 --port=8080 > logs/reverb.log 2>&1 &
            nohup php artisan queue:work > logs/queue.log 2>&1 &
          "
