name: Local CI/CD
# 브랜치 전략: develop + main
# - develop: 일상 개발 브랜치 (feature/* → PR → develop)
# - main:   안정 릴리스 브랜치 (develop → PR → main, CI/CD 자동 배포)
#
# 배포 파이프라인:
#   - docker compose build (npm ci 포함) + up → composer install → test → migrate → swagger → restart
#   - Node 의존성은 Dockerfile RUN npm ci로 설치, anonymous volume으로 보존
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      LIVE_ROOT: ${{ vars.LIVE_ROOT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 0. .env 파일 복원 — CI 체크아웃은 gitignore로 인해 .env 누락
      - name: Restore Environment Files
        run: |
          cp $LIVE_ROOT/laravel/.env ./laravel/.env
          cp $LIVE_ROOT/laravel/.env.testing ./laravel/.env.testing
          cp $LIVE_ROOT/docker/.env ./docker/.env
          cp $LIVE_ROOT/nextjs/.env.local ./nextjs/.env.local

      # 1. 컨테이너 기동 — Dockerfile 변경 여부와 관계없이 항상 build + up
      - name: Start Containers
        run: |
          cd ./docker
          docker compose build
          docker compose up -d
          sleep 3

      # 2. PHP 의존성 설치 — Laravel Dockerfile에 composer install이 없으므로 항상 실행
      - name: Install PHP Dependencies
        run: docker exec cl_embed_laravel composer install --no-interaction

      # 3. 테스트 DB 준비 및 Laravel 테스트 실행
      - name: Prepare Test Database
        run: |
          docker exec pgvector_03 psql -U dbeaver_lim -d postgres -c "CREATE DATABASE cl_embed_test;" 2>/dev/null || true
          docker exec pgvector_03 psql -U dbeaver_lim -d cl_embed_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run Laravel Tests
        run: docker exec cl_embed_laravel php artisan test --compact

      # 4. DB 마이그레이션 — 실패 시 해당 batch만 롤백 후 중단
      - name: Run Database Migrations
        run: |
          # 현재 마지막 batch 번호를 기록 (없으면 0)
          LAST_BATCH=$(docker exec pgvector_03 psql -U dbeaver_lim -d cl_embed -t -A -c "SELECT COALESCE(MAX(batch), 0) FROM migrations;" 2>/dev/null || echo 0)
          echo "Current last batch: $LAST_BATCH"
          docker exec cl_embed_laravel php artisan migrate --force || {
            echo "Migration failed. Rolling back batch $((LAST_BATCH + 1))..."
            # 새로 생성된 batch만 정확히 롤백
            NEW_BATCH=$((LAST_BATCH + 1))
            docker exec cl_embed_laravel php artisan migrate:rollback --batch=$NEW_BATCH --force 2>/dev/null || true
            echo "Rollback completed. Deployment aborted."
            exit 1
          }

      # 5. Swagger 문서 생성 — 프로덕션 API 문서 최신화
      - name: Generate Swagger Docs
        run: docker exec cl_embed_laravel php artisan l5-swagger:generate

      # 6. 컨테이너 재시작 — 최신 코드로 프로세스 재시작
      #    (restart/force-recreate 대신 stop+up 사용: Docker Desktop WSL2에서
      #     bind mount 경로가 무효화되어 "no such file or directory" 오류 방지)
      - name: Restart Containers
        run: |
          cd $LIVE_ROOT/docker
          docker compose stop cl_embed_laravel cl_embed_nextjs
          docker compose up -d cl_embed_laravel cl_embed_nextjs
          docker exec docker-nginx-1 nginx -s reload
          sleep 3

      # 7. 헬스체크 — 모든 서비스 정상 응답 확인
      - name: Health Check
        run: |
          echo "--- Laravel API (port 8000) ---"
          docker exec cl_embed_laravel php -r "
            echo @file_get_contents('http://localhost:8000/', false, stream_context_create(['http' => ['timeout' => 5]])) ? 'OK' : 'FAIL';
          " || echo "WARN: Laravel health check failed"
          echo ""

          echo "--- Next.js (port 3000) ---"
          docker exec cl_embed_nextjs curl -sf -m 10 http://localhost:3000/ && echo "OK" || echo "WARN: Next.js health check failed"

          echo "--- Nginx (port 80) ---"
          curl -sf -m 10 http://localhost/ && echo "OK" || echo "WARN: Nginx health check failed"

      # 8. 워크스페이스 정리 — appuser 실행으로 vendor/logs는 UID 1000 소유
      - name: Cleanup Workspace
        if: always()
        run: |
          docker run --rm \
            -v "$(pwd)":/ws \
            alpine sh -c "
              set +e
              [ -d /ws/laravel/vendor ] && chown -R 1000:1000 /ws/laravel/vendor 2>/dev/null
              [ -f /ws/laravel/.env ] && chown 1000:1000 /ws/laravel/.env 2>/dev/null
              exit 0
            "
