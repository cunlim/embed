name: Local CI/CD
# 브랜치 전략: develop + main
# - develop: 일상 개발 브랜치 (feature/* → PR → develop)
# - main:   안정 릴리스 브랜치 (develop → PR → main, CI/CD 자동 배포)
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # 0. 모든 컨테이너가 실행 중인지 확인 (선행 조건)
      - name: Ensure Containers Are Running
        run: |
          cd ./docker
          docker compose up -d
          sleep 3

      # 1. 컨테이너 이미지 재빌드 (Dockerfile 변경 반영)
      - name: Rebuild Container Images
        run: |
          cd ./docker
          docker compose build --no-cache cl_embed_laravel cl_embed_nextjs

      # 2. 새 이미지로 컨테이너 재생성 (로그 파일 정리 후)
      - name: Recreate Containers
        run: |
          cd ./docker
          rm -f ./laravel/volume/log/*.log
          docker compose up -d --force-recreate
          sleep 5

      # 3. PHP 의존성 설치 (dev 의존성 포함 — Pest 테스트 실행에 필요)
      - name: Install PHP Dependencies
        run: docker exec cl_embed_laravel composer install --no-interaction

      # 4. Node 의존성 설치
      - name: Install Node Dependencies
        run: docker exec cl_embed_nextjs npm ci

      # 5. Laravel 테스트 실행 — 실패 시 이후 단계 진행 안 함 (fail-fast)
      - name: Run Laravel Tests
        run: docker exec cl_embed_laravel php artisan test --compact

      # 6. Next.js 프로덕션 빌드
      - name: Build Next.js
        run: docker exec cl_embed_nextjs npm run build

      # 7. DB 마이그레이션 — 실패 시 마지막 배치 롤백 후 중단
      - name: Run Database Migrations
        run: |
          docker exec cl_embed_laravel php artisan migrate --force || {
            echo "Migration failed. Rolling back last batch..."
            docker exec cl_embed_laravel php artisan migrate:rollback --step=1 --force
            echo "Rollback completed. Deployment aborted."
            exit 1
          }

      # 8. 컨테이너 재시작 — supervisord가 최신 코드와 빌드 결과로 프로세스 재기동
      - name: Restart Containers
        run: |
          cd ./docker
          docker compose restart cl_embed_laravel cl_embed_nextjs
          sleep 3
          # 컨테이너 IP 변경으로 인한 502 방지 — Nginx DNS 캐시 갱신
          docker exec docker-nginx-1 nginx -s reload
          sleep 2

      # 9. 헬스체크 — 모든 서비스 정상 응답 확인
      - name: Health Check
        run: |
          echo "--- Laravel API (port 8000) ---"
          docker exec cl_embed_laravel php -r "
            \$ctx = stream_context_create(['http' => ['timeout' => 5]]);
            echo file_get_contents('http://localhost:8000/', false, \$ctx) ? 'OK' : 'FAIL';
          " || echo "WARN: Laravel health check failed"
          echo ""

          echo "--- Laravel Reverb (port 8080) ---"
          docker exec cl_embed_laravel bash -c 'echo > /dev/tcp/localhost/8080 && echo "OK"' || echo "WARN: Reverb health check failed"

          echo "--- Next.js (port 3000) ---"
          docker exec cl_embed_nextjs curl -f -m 10 http://localhost:3000/ && echo "OK" || echo "WARN: Next.js health check failed"

          echo "--- Nginx (port 80) ---"
          curl -f -m 10 http://localhost/ && echo "OK" || echo "WARN: Nginx health check failed"
